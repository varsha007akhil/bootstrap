<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>online backery feedback form</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
</head>
<body>
    <header>
        <h2>Golden Oven Bakery</h2>
    </header>
    <div class="container">

     <div class="form-group">
        <label for="name">Name:</label>
        <input type="name" class="form-control" id="name">
    </div>

    <div class="form-group">
        <label for="email">Email</label>
     <input type="email" class="form-control" id="email"> 
    </div>

    <div class="form-group">
        <label for="feedback">feedback:</label>
        <textarea class="form-control" row="4" id="message"></textarea>
    </div>

    <div class="form-group">
        <label>prffered contact method</label>

        <div class="form check">
            <input class="form-check-input" type="radio" name="contact" id="emailcontact">
            <label class="form-check-label" for="phonecontact">
                phone
            </label>
        </div>
        </div>

       <div class="form-group">
        <label for="satisfaction">
            satisfation level(1-10)
        </label>
        <input type="range" class="form-control-range" id="satisfaction" min="1" max="10">
       </div> 

       <div class="form-group">
        <label for="ordertype">order type</label>
        <select class="form-control" id="ordertype">
           <option selected disabled>Select Order Type</option>
            <option>Cake</option>
            <option>Cookies</option>
            <option>Pastries</option>
        </select>

       </div>
    <button type="submit" class="btn btn-warning btn-block">
                            Submit Feedback
                        </button>

                   

    </div>
 <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>   
</body>
</html>
